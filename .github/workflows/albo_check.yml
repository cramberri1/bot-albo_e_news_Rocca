name: Albo Pretorio Check

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: albo-rocca-bot
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
          INTERVAL_MINUTES: "15"
        run: |
          set +e
          timeout --signal=INT --kill-after=30s 21420 python bot.py
          code=$?

          if [ "$code" -eq 124 ]; then
            echo "Timeout programmato di 357 minuti raggiunto: chiusura normale."
            exit 0
          fi

          exit "$code"

      - name: Salva eventuale stato residuo
        if: always()
        run: |
          git config user.name "AlboBot"
          git config user.email "bot@alborocca"

          files=(
            data/seen_items.json
            data/subscribers.json
            data/user_seen.json
            data/seen_news.json
            data/subscribers_news.json
          )

          existing=()
          for file in "${files[@]}"; do
            if [ -e "$file" ]; then
              existing+=("$file")
            fi
          done

          if [ "${#existing[@]}" -eq 0 ]; then
            echo "Nessun file di stato da salvare."
            exit 0
          fi

          git add -- "${existing[@]}"
          if git diff --staged --quiet; then
            echo "Nessuna modifica residua da committare."
            exit 0
          fi

          git commit -m "aggiornamento database finale [skip ci]"
          git push
